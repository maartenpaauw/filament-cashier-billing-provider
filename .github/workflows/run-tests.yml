name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]
        php: [8.5, 8.4, 8.3, 8.2]
        stability: [prefer-lowest, prefer-stable]

    name: P${{ matrix.php }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies (Laravel 12)
        run: composer update --${{ matrix.stability }} --prefer-dist --no-interaction --with="illuminate/support:^12.0"

      - name: Execute tests (Laravel 12)
        run: vendor/bin/pest

      - name: Install dependencies (Laravel 13)
        if: matrix.php >= 8.3
        run: composer update --${{ matrix.stability }} --prefer-dist --no-interaction --with="illuminate/support:^13.0"

      - name: Execute tests (Laravel 13)
        run: vendor/bin/pest
